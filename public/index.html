<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Gestión de Socios</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;padding:2rem 1rem}
    h1{text-align:center;font-size:1.75rem;color:#4f46e5;margin-bottom:.25rem}
    .sub{text-align:center;color:#64748b;font-size:.9rem;margin-bottom:2rem}
    .tarjeta{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.5rem;max-width:660px;margin:0 auto 1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .tarjeta h2{font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:1rem}
    .campo{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.9rem}
    label{font-size:.875rem;font-weight:600}
    input{padding:.55rem .75rem;border:1px solid #cbd5e1;border-radius:8px;font-size:.95rem;outline:none}
    input:focus{border-color:#4f46e5}
    button{width:100%;padding:.65rem;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer}
    button:hover{background:#3730a3}
    button:disabled{background:#94a3b8;cursor:not-allowed}
    #mensaje{display:none;margin-top:.75rem;padding:.6rem .85rem;border-radius:8px;font-size:.875rem}
    #mensaje.ok{display:block;background:#dcfce7;color:#15803d}
    #mensaje.error{display:block;background:#fee2e2;color:#b91c1c}
    table{width:100%;border-collapse:collapse;font-size:.9rem}
    th{text-align:left;padding:.55rem .75rem;background:#f8fafc;border-bottom:2px solid #e2e8f0;color:#64748b;font-size:.78rem;text-transform:uppercase}
    td{padding:.65rem .75rem;border-bottom:1px solid #f1f5f9}
    tr:hover td{background:#f8fafc}
    .badge{display:inline-block;padding:.15rem .5rem;background:#ede9fe;color:#4f46e5;border-radius:999px;font-size:.78rem;font-weight:700}
    .vacio{text-align:center;color:#94a3b8;padding:1.5rem}
  </style>
</head>
<body>
  <h1>👥 Gestión de Socios</h1>
  <p class="sub">Registra socios y consúltalos en tiempo real</p>
  <div class="tarjeta">
    <h2>Registrar nuevo socio</h2>
    <div class="campo">
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" placeholder="Ej: María García" />
    </div>
    <div class="campo">
      <label for="correo">Correo electrónico</label>
      <input type="email" id="correo" placeholder="Ej: maria@correo.com" />
    </div>
    <button id="btnRegistrar">Registrar</button>
    <div id="mensaje"></div>
  </div>
  <div class="tarjeta">
    <h2>Lista de socios</h2>
    <table>
      <thead><tr><th>ID</th><th>Nombre</th><th>Correo</th><th>Fecha de ingreso</th></tr></thead>
      <tbody id="cuerpoTabla"><tr><td colspan="4" class="vacio">Cargando…</td></tr></tbody>
    </table>
  </div>
  <script>
    const URL_API = "/api/socios";
    async function cargarSocios() {
      try {
        const socios = await (await fetch(URL_API)).json();
        const c = document.getElementById("cuerpoTabla");
        c.innerHTML = socios.length === 0
          ? '<tr><td colspan="4" class="vacio">No hay socios aún.</td></tr>'
          : socios.map(s=>`<tr><td><span class="badge">${s.id}</span></td><td>${s.nombre}</td><td>${s.correo}</td><td>${s.fecha_ingreso}</td></tr>`).join("");
      } catch {
        document.getElementById("cuerpoTabla").innerHTML='<tr><td colspan="4" class="vacio">Error al conectar.</td></tr>';
      }
    }
    document.getElementById("btnRegistrar").addEventListener("click", async () => {
      const nombre=document.getElementById("nombre").value.trim();
      const correo=document.getElementById("correo").value.trim();
      const btn=document.getElementById("btnRegistrar");
      const mensaje=document.getElementById("mensaje");
      if(!nombre||!correo){mensaje.textContent="Completa ambos campos.";mensaje.className="error";return;}
      btn.disabled=true;btn.textContent="Registrando…";
      try {
        const r=await fetch(URL_API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({nombre,correo})});
        const data=await r.json();
        if(r.ok){mensaje.textContent="✅ "+data.mensaje;mensaje.className="ok";document.getElementById("nombre").value="";document.getElementById("correo").value="";cargarSocios();}
        else{mensaje.textContent="❌ "+data.error;mensaje.className="error";}
      } catch{mensaje.textContent="❌ Error de conexión.";mensaje.className="error";}
      finally{btn.disabled=false;btn.textContent="Registrar";}
    });
    cargarSocios();
  </script>
</body>
</html>
